steps:
  preprocess:
    image: python:3.9
    command:
      - pip install -r requirements.txt
      - python src/preprocess.py

  train:
    image: python:3.9
    command:
      - pip install -r requirements.txt
      - python src/train.py

  evaluate:
    image: python:3.9
    command:
      - pip install -r requirements.txt
      - python src/evaluate.py

pipelines:
  training-pipeline:
    steps:
      - preprocess
      - train
      - evaluate